name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev liblzma-dev cmake libffi-dev libssl-dev
        pip3 install --user buildozer cython virtualenv

    - name: Pre-setup Android SDK/NDK/Ant
      run: |
        set -e
        mkdir -p ~/.buildozer/android/platform

        # 1. Android SDK (Buildozer 1.5.0 硬编码了旧版 commandlinetools，我们提前下载并放好在它期望的路径)
        SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
        if [ ! -f "$SDK_DIR/tools/bin/sdkmanager" ]; then
          echo "Downloading Android SDK command line tools..."
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-6514223_latest.zip -O /tmp/cmdline-tools.zip
          mkdir -p "$SDK_DIR"
          unzip -q /tmp/cmdline-tools.zip -d "$SDK_DIR"
        fi
        export PATH="$SDK_DIR/tools/bin:$PATH"

        # 2. 接受所有 license（关键！）
        echo "Accepting Android SDK licenses..."
        mkdir -p "$SDK_DIR/licenses"
        yes | sdkmanager --licenses >/dev/null 2>&1 || true

        # 3. 预装 Buildozer 需要的包，避免它再调用 sdkmanager 时被 license 卡住
        echo "Installing SDK packages..."
        sdkmanager "platform-tools" "build-tools;33.0.2" "platforms;android-33"

        # 4. Android NDK (Buildozer 推荐 25b)
        NDK_DIR="$HOME/.buildozer/android/platform/android-ndk-r25b"
        if [ ! -d "$NDK_DIR" ]; then
          echo "Downloading Android NDK..."
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d ~/.buildozer/android/platform/
        fi

        # 5. Apache Ant (Buildozer 也需要它)
        ANT_DIR="$HOME/.buildozer/android/platform/apache-ant-1.9.4"
        if [ ! -d "$ANT_DIR/bin" ]; then
          echo "Downloading Apache Ant..."
          mkdir -p "$ANT_DIR"
          wget -q https://archive.apache.org/dist/ant/binaries/apache-ant-1.9.4-bin.tar.gz -O /tmp/ant.tar.gz
          tar -xzf /tmp/ant.tar.gz -C "$ANT_DIR" --strip-components=1
        fi

    - name: Build APK
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: flightduty-apk
        path: bin/*.apk
